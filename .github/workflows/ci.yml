name: Infra CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  packages: read

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: |
          # Creamos un .env temporal a partir del example para que config no falle por variables faltantes
          cp .env.example .env
          docker compose config -q
          
  smoke-test:
    runs-on: ubuntu-latest
    needs: validate-compose
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Usamos el GITHUB_TOKEN provisto automáticamente por GitHub Actions
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        run: cp .env.example .env

      - name: Clean up stale volumes
        run: docker compose down -v

      - name: Pull infrastructure images
        run: docker compose pull db users-db notification-db assignment-db rabbitmq

      - name: Start infrastructure services (Smoke Test)
        run: |
          # Solo levantamos los servicios de infraestructura (4 DBs + RabbitMQ).
          # El runner de CI tiene ~7 GB de RAM; levantar los 15 contenedores del
          # stack completo agota la memoria y provoca que los Postgres reciban
          # un SIGTERM por OOM antes de terminar de iniciar.
          docker compose up -d --wait --wait-timeout 120 \
            db users-db notification-db assignment-db rabbitmq

      - name: Check container status
        run: |
          echo "=== Container Status ==="
          docker compose ps db users-db notification-db assignment-db rabbitmq

          # Si algún contenedor de infra salió (Exited), fallamos el CI
          INFRA_SERVICES="db users-db notification-db assignment-db rabbitmq"
          EXITED=$(docker compose ps $INFRA_SERVICES -q | xargs docker inspect -f '{{ .State.Status }}' | grep -c -v "running" || true)
          if [ "$EXITED" -gt "0" ]; then
            echo "❌ Fallo: Algunos contenedores de infraestructura no están corriendo."
            echo "=== Logs ==="
            docker compose logs --tail=50 db users-db notification-db assignment-db rabbitmq
            exit 1
          else
            echo "✅ Todo en orden, servicios de infraestructura corriendo."
          fi

      - name: Stop services
        if: always()
        run: docker compose down -v
